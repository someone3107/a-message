<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheer Up Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-deep: #d63a7a;
    --text: #a0527a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(ellipse at 30% 40%, #fff0fa 0%, #fff9c4 50%, #ffd6ec 100%);
    overflow: hidden;
    font-family: 'Lora', serif;
  }

  /* ══ SIDES ══ */
  .side {
    position: fixed;
    top: 0;
    height: 100vh;
    width: 180px;
    z-index: 0;
    overflow: hidden;
  }
  .side-left  { left: 0; }
  .side-right { right: 0; }

  .flower {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .flower-head {
    position: relative;
    width: 54px;
    height: 54px;
  }
  .petal {
    position: absolute;
    width: 20px; height: 32px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform-origin: bottom center;
  }
  .petal:nth-child(1)  { transform: translate(-50%,-100%) rotate(0deg); }
  .petal:nth-child(2)  { transform: translate(-50%,-100%) rotate(45deg); }
  .petal:nth-child(3)  { transform: translate(-50%,-100%) rotate(90deg); }
  .petal:nth-child(4)  { transform: translate(-50%,-100%) rotate(135deg); }
  .petal:nth-child(5)  { transform: translate(-50%,-100%) rotate(180deg); }
  .petal:nth-child(6)  { transform: translate(-50%,-100%) rotate(225deg); }
  .petal:nth-child(7)  { transform: translate(-50%,-100%) rotate(270deg); }
  .petal:nth-child(8)  { transform: translate(-50%,-100%) rotate(315deg); }
  .flower-center {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: 2;
  }
  .flower-stem {
    width: 4px;
    border-radius: 4px;
    background: linear-gradient(to bottom, #81c784, #388e3c);
  }
  .flower-leaf {
    width: 22px; height: 12px;
    border-radius: 0 50% 50% 0;
    background: linear-gradient(135deg, #a5d6a7, #43a047);
    position: absolute;
  }

  .f-sunny    .petal { background: #ffe066; }
  .f-sunny    .flower-center { background: #ff8f00; }
  .f-rose     .petal { background: #f48fb1; }
  .f-rose     .flower-center { background: #c2185b; }
  .f-lavender .petal { background: #ce93d8; }
  .f-lavender .flower-center { background: #7b1fa2; }
  .f-coral    .petal { background: #ffab91; }
  .f-coral    .flower-center { background: #e64a19; }
  .f-sky      .petal { background: #81d4fa; }
  .f-sky      .flower-center { background: #0288d1; }

  .sway-a { animation: swayA 3.5s ease-in-out infinite; transform-origin: bottom center; }
  .sway-b { animation: swayB 4s   ease-in-out infinite; transform-origin: bottom center; }
  .sway-c { animation: swayA 2.8s ease-in-out infinite reverse; transform-origin: bottom center; }

  @keyframes swayA { 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);} }
  @keyframes swayB { 0%,100%{transform:rotate(5deg);}  50%{transform:rotate(-5deg);} }

  .sparkle {
    position: absolute;
    font-size: 22px;
    animation: twinkle 2s ease-in-out infinite;
    opacity: 0.8;
  }
  @keyframes twinkle {
    0%,100%{transform:scale(1) rotate(0deg); opacity:0.6;}
    50%    {transform:scale(1.4) rotate(20deg); opacity:1;}
  }

  .butterfly {
    position: absolute;
    font-size: 30px;
    animation: flutter 2.5s ease-in-out infinite;
  }
  @keyframes flutter {
    0%,100%{transform:translateY(0) rotate(-5deg) scale(1);}
    25%    {transform:translateY(-12px) rotate(5deg) scale(1.1);}
    75%    {transform:translateY(6px) rotate(-3deg) scale(0.95);}
  }

  .rainbow {
    position: absolute;
    width: 120px; height: 60px;
    border-radius: 60px 60px 0 0;
    border-top: 8px solid #ff5252;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    box-shadow: 0 -8px 0 0 #ff9800, 0 -16px 0 0 #ffeb3b,
                0 -24px 0 0 #4caf50, 0 -32px 0 0 #2196f3,
                0 -40px 0 0 #9c27b0;
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100%{opacity:0.7; filter:brightness(1);}
    50%    {opacity:1;   filter:brightness(1.2);}
  }

  .cloud {
    position: absolute;
    width: 70px; height: 28px;
    background: #fff;
    border-radius: 30px;
    opacity: 0.75;
    animation: drift 6s ease-in-out infinite;
  }
  .cloud::before {
    content:''; position:absolute;
    width:36px; height:36px;
    background:#fff; border-radius:50%;
    top:-18px; left:10px;
  }
  .cloud::after {
    content:''; position:absolute;
    width:24px; height:24px;
    background:#fff; border-radius:50%;
    top:-12px; left:36px;
  }
  @keyframes drift { 0%,100%{transform:translateX(0);} 50%{transform:translateX(10px);} }

  /* ══ ENVELOPE + CARD ══ */
  .container {
    position: relative;
    width: 320px;
    height: 240px;
    cursor: pointer;
    z-index: 1;
  }

  .card {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    width: 244px;
    height: 180px;
    background: linear-gradient(160deg, #fffdf5 55%, #ffe8f5 100%);
    border: 2px dashed #ffb3d1;
    border-radius: 10px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px 18px;
    transition: bottom 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 6px 24px rgba(255,130,170,0.18);
  }

  .container:hover .card { bottom: 185px; }

  .card-emoji {
    font-size: 36px;
    margin-bottom: 8px;
    animation: wobble 2.2s ease-in-out infinite;
    display: block;
    filter: drop-shadow(0 3px 6px rgba(255,150,80,0.3));
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--pink-deep);
    line-height: 1.3;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .card-message {
    font-family: 'Lora', serif;
    font-size: 10px;
    font-style: italic;
    color: var(--text);
    line-height: 1.8;
    letter-spacing: 0.2px;
  }
  .card::before { content:'🌸'; position:absolute; top:7px; left:9px; font-size:12px; }
  .card::after  { content:'🌸'; position:absolute; top:7px; right:9px; font-size:12px; }

  /* Envelope */
  .envelope-body {
    position:absolute; bottom:0; left:0;
    width:320px; height:188px;
    background:#ffb3c6;
    border-radius:6px 6px 10px 10px;
    z-index:4; overflow:hidden;
  }
  .envelope-body::after {
    content:''; position:absolute; bottom:0; left:0;
    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-bottom:110px solid #ff85a1;
  }
  .envelope-left {
    position:absolute; bottom:0; left:0;
    border-top:94px solid transparent;
    border-bottom:94px solid #ffadc3;
    border-left:160px solid #ffadc3;
    z-index:5;
  }
  .envelope-right {
    position:absolute; bottom:0; right:0;
    border-top:94px solid transparent;
    border-bottom:94px solid #ff99b5;
    border-right:160px solid #ff99b5;
    z-index:5;
  }
  .envelope-flap {
    position:absolute; top:0; left:0;
    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-top:110px solid #ffccd8;
    z-index:6;
    transform-origin:top center;
    transition:transform 0.65s ease;
  }
  .container:hover .envelope-flap { transform:rotateX(180deg); z-index:2; }

  /* Floaties */
  .floaties { position:absolute; width:100%; height:100%; pointer-events:none; z-index:10; }
  .floatie  { position:absolute; bottom:188px; font-size:16px; opacity:0; }
  .container:hover .floatie { animation:floatUp 2.4s ease-in-out forwards; }
  .floatie:nth-child(1){left:10px;  animation-delay:0.2s;}
  .floatie:nth-child(2){left:55px;  animation-delay:0.5s;}
  .floatie:nth-child(3){left:105px; animation-delay:0.3s;}
  .floatie:nth-child(4){left:155px; animation-delay:0.7s;}
  .floatie:nth-child(5){left:205px; animation-delay:0.4s;}
  .floatie:nth-child(6){left:255px; animation-delay:0.9s;}
  .floatie:nth-child(7){left:295px; animation-delay:0.6s;}

  @keyframes floatUp {
    0%  {opacity:0; transform:translateY(0) rotate(0deg) scale(0.5);}
    30% {opacity:1;}
    100%{opacity:0; transform:translateY(-130px) rotate(25deg) scale(1.2);}
  }
  @keyframes wobble {
    0%,100%{transform:rotate(-8deg) scale(1);}
    50%    {transform:rotate(8deg) scale(1.18);}
  }
</style>
</head>
<body>

<!-- LEFT SIDE -->
<div class="side side-left">
  <div class="rainbow" style="top:60px; left:20px;"></div>
  <div class="cloud"   style="top:130px; left:10px;"></div>

  <div class="flower sway-a" style="position:absolute; bottom:60px; left:30px;">
    <div class="flower-head f-sunny">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="flower-center"></div>
    </div>
    <div class="flower-stem" style="height:120px; position:relative;">
      <div class="flower-leaf" style="top:30px; left:4px; transform:rotate(-30deg);"></div>
      <div class="flower-leaf" style="top:70px; left:-26px; transform:rotate(210deg);"></div>
    </div>
  </div>

  <div class="flower sway-b" style="position:absolute; bottom:60px; left:90px;">
    <div class="flower-head f-rose">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="flower-center"></div>
    </div>
    <div class="flower-stem" style="height:80px; position:relative;">
      <div class="flower-leaf" style="top:20px; left:4px; transform:rotate(-30deg);"></div>
    </div>
  </div>

  <div class="flower sway-c" style="position:absolute; bottom:60px; left:145px;">
    <div class="flower-head f-lavender">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="flower-center"></div>
    </div>
    <div class="flower-stem" style="height:100px; position:relative;">
      <div class="flower-leaf" style="top:40px; left:-26px; transform:rotate(210deg);"></div>
    </div>
  </div>

  <div class="butterfly" style="top:260px; left:50px; animation-delay:0.6s;">🦋</div>
  <div class="sparkle"   style="top:200px; left:130px; animation-delay:0s;">✨</div>
  <div class="sparkle"   style="top:350px; left:20px;  animation-delay:0.8s; font-size:16px;">⭐</div>
  <div class="sparkle"   style="top:420px; left:110px; animation-delay:1.4s; font-size:14px;">💫</div>
</div>

<!-- RIGHT SIDE -->
<div class="side side-right">
  <div class="cloud" style="top:80px; right:10px; animation-delay:1s;"></div>

  <div class="flower sway-b" style="position:absolute; bottom:60px; right:130px;">
    <div class="flower-head f-coral">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="flower-center"></div>
    </div>
    <div class="flower-stem" style="height:110px; position:relative;">
      <div class="flower-leaf" style="top:30px; left:4px; transform:rotate(-30deg);"></div>
      <div class="flower-leaf" style="top:65px; left:-26px; transform:rotate(210deg);"></div>
    </div>
  </div>

  <div class="flower sway-a" style="position:absolute; bottom:60px; right:70px;">
    <div class="flower-head f-sky">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="flower-center"></div>
    </div>
    <div class="flower-stem" style="height:90px; position:relative;">
      <div class="flower-leaf" style="top:25px; left:4px; transform:rotate(-30deg);"></div>
    </div>
  </div>

  <div class="flower sway-c" style="position:absolute; bottom:60px; right:10px;">
    <div class="flower-head f-sunny">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="flower-center"></div>
    </div>
    <div class="flower-stem" style="height:130px; position:relative;">
      <div class="flower-leaf" style="top:40px; left:4px; transform:rotate(-30deg);"></div>
      <div class="flower-leaf" style="top:80px; left:-26px; transform:rotate(210deg);"></div>
    </div>
  </div>

  <div class="butterfly" style="top:240px; right:30px; animation-delay:1.2s;">🦋</div>
  <div class="sparkle"   style="top:170px; right:20px;  animation-delay:0.5s;">✨</div>
  <div class="sparkle"   style="top:320px; right:120px; animation-delay:1.1s; font-size:16px;">🌟</div>
  <div class="sparkle"   style="top:440px; right:50px;  animation-delay:1.8s; font-size:18px;">💫</div>
</div>

<!-- ENVELOPE -->
<div class="container">
  <div class="floaties">
    <div class="floatie">⭐</div>
    <div class="floatie">🌸</div>
    <div class="floatie">✨</div>
    <div class="floatie">🌈</div>
    <div class="floatie">💛</div>
    <div class="floatie">🦋</div>
    <div class="floatie">🌟</div>
  </div>

  <div class="card">
    <span class="card-emoji">🌻</span>
    <div class="card-title">Hey Pratika 💛</div>
    <div class="card-message">
      You're stronger, kinder, and more amazing<br>
      than you sometimes believe.<br>
      And I'm really glad you exist. 💛
    </div>
  </div>

  <div class="envelope-flap"></div>
  <div class="envelope-body"></div>
  <div class="envelope-left"></div>
  <div class="envelope-right"></div>
</div>

</body>
</html>
